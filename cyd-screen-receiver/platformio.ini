; ================================================================
; Single project for ESP32-S3 Camera → CYD Screen  (WiFi UDP)
;
; Flash camera board:   pio run -e camera-sender -t upload
; Flash CYD:            pio run -e cyd-receiver  -t upload
; Monitor camera:       pio device monitor -e camera-sender
; Monitor CYD:          pio device monitor -e cyd-receiver
; ================================================================

[env:camera-sender]
platform = espressif32
board = freenove_esp32_s3_wroom
framework = arduino

upload_port = COM5
monitor_port = COM5
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DBOARD_HAS_PSRAM
    -I${PROJECT_DIR}

board_build.partitions = huge_app.csv

build_src_filter = -<*> +<../src_camera/>

lib_deps =
    https://github.com/0015/ESP32-OV5640-AF.git


[env:cyd-receiver]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = COM8
monitor_port = COM8
monitor_speed = 115200
upload_speed = 115200

build_src_filter = -<*> +<../src_screen/>

; secrets.h lives in the project root — add it to the include path
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_MISO=12
    -DTOUCH_CS=33
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -I${PROJECT_DIR}

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bodmer/TJpg_Decoder @ ^1.0.8
